strategy_family: intraday_breakout
currency: USD
timezone: America/New_York
calendar: XNYS
universe_id: us_stock_intraday
benchmark_symbol: SPY
lifecycle:
  role: experimental
  line_id: intraday_lab
execution:
  long_only: true
  rebalance_min_trade_value: 500
